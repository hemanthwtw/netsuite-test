- name: Get changed files and deploy
        working-directory: netsuite-test
        run: |
          echo "=== DEBUG: Check credentials file ==="
          cat $HOME/.suitecloud-sdk/cli-credentials.json || echo "FILE NOT FOUND"
          
          echo "=== DEBUG: Check suitecloud version ==="
          suitecloud --version
          
          echo "=== DEBUG: List suitecloud commands ==="
          suitecloud --help
          
          echo "=== DEBUG: Check project folder ==="
          ls -la
          cat suitecloud.config.js
          
          echo "=== Detecting changed files ==="
          git diff --name-only HEAD~1 HEAD | grep 'netsuite-test/src/FileCabinet/SuiteScripts/' | sed 's|netsuite-test/||' > changed_files.txt
          cat changed_files.txt
          
          if [ ! -s changed_files.txt ]; then
            echo "No SuiteScript files changed."
            exit 0
          fi
          
          while IFS= read -r file; do
            if [ -f "$file" ]; then
              echo "Uploading: $file"
              suitecloud file:upload --paths "/$file"
            fi
          done < changed_files.txt