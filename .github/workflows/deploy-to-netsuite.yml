name: Deploy ALL Scripts to NetSuite (Debug Mode)

on:
  push:
    branches:
      - main
  workflow_dispatch:  # allows manual trigger from GitHub Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies locally
        run: |
          mkdir -p /tmp/nsdeploy
          cd /tmp/nsdeploy
          npm init -y
          npm install oauth-1.0a

      - name: Upload all SuiteScript files to NetSuite
        env:
          NS_ACCOUNT_ID: ${{ secrets.NS_ACCOUNT_ID }}
          NS_CONSUMER_KEY: ${{ secrets.NS_CONSUMER_KEY }}
          NS_CONSUMER_SECRET: ${{ secrets.NS_CONSUMER_SECRET }}
          NS_TOKEN_ID: ${{ secrets.NS_TOKEN_ID }}
          NS_TOKEN_SECRET: ${{ secrets.NS_TOKEN_SECRET }}
          NS_SCRIPTS_FOLDER_ID: ${{ secrets.NS_SCRIPTS_FOLDER_ID }}
        run: |
          # Find all JS files in SuiteScripts folder
          find netsuite-test/src/FileCabinet/SuiteScripts -name "*.js" > all_files.txt
          echo "=== Files to upload ==="
          cat all_files.txt
          echo "======================"

          node --require /tmp/nsdeploy/node_modules/oauth-1.0a << 'NODEJS'
          const fs = require('fs');
          const https = require('https');
          const crypto = require('crypto');
          const OAuth = require('/tmp/nsdeploy/node_modules/oauth-1.0a');

          const accountId = process.env.NS_ACCOUNT_ID;
          const consumerKey = process.env.NS_CONSUMER_KEY;
          const consumerSecret = process.env.NS_CONSUMER_SECRET;
          const tokenId = process.env.NS_TOKEN_ID;
          const tokenSecret = process.env.NS_TOKEN_SECRET;
          const folderId = process.env.NS_SCRIPTS_FOLDER_ID;

          // Validate all secrets are present
          const missing = [];
          if (!accountId) missing.push('NS_ACCOUNT_ID');
          if (!consumerKey) missing.push('NS_CONSUMER_KEY');
          if (!consumerSecret) missing.push('NS_CONSUMER_SECRET');
          if (!tokenId) missing.push('NS_TOKEN_ID');
          if (!tokenSecret) missing.push('NS_TOKEN_SECRET');
          if (!folderId) missing.push('NS_SCRIPTS_FOLDER_ID');
          if (missing.length > 0) {
            console.error('MISSING SECRETS:', missing.join(', '));
            process.exit(1);
          }

          console.log('Account ID:', accountId);
          console.log('Folder ID:', folderId);
          console.log('Consumer Key (first 6):', consumerKey.substring(0, 6) + '...');
          console.log('Token ID (first 6):', tokenId.substring(0, 6) + '...');

          // Build OAuth 1.0 TBA header using the oauth-1.0a library (more reliable)
          const oauth = new OAuth({
            consumer: { key: consumerKey, secret: consumerSecret },
            signature_method: 'HMAC-SHA256',
            hash_function(base_string, key) {
              return crypto.createHmac('sha256', key).update(base_string).digest('base64');
            },
            realm: accountId
          });

          function generateAuthHeader(method, url) {
            const token = { key: tokenId, secret: tokenSecret };
            const requestData = { url, method };
            const authObj = oauth.authorize(requestData, token);
            return oauth.toHeader(authObj).Authorization;
          }

          async function uploadFile(filepath) {
            const filename = filepath.split('/').pop();
            const fileContent = fs.readFileSync(filepath);
            const contentBase64 = fileContent.toString('base64');

            // NetSuite REST record URL for file upload
            const url = `https://${accountId}.suitetalk.api.netsuite.com/services/rest/record/v1/file`;

            const bodyObj = {
              name: filename,
              content: contentBase64,
              folder: { id: folderId }
            };
            const body = JSON.stringify(bodyObj);

            const authHeader = generateAuthHeader('POST', url);

            console.log(`\n--- Uploading: ${filename} ---`);
            console.log(`URL: ${url}`);
            console.log(`File size: ${fileContent.length} bytes`);
            console.log(`Auth header prefix: ${authHeader.substring(0, 80)}...`);

            return new Promise((resolve, reject) => {
              const urlObj = new URL(url);
              const options = {
                hostname: urlObj.hostname,
                path: urlObj.pathname,
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': authHeader,
                  'Content-Length': Buffer.byteLength(body)
                }
              };

              const req = https.request(options, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  console.log(`HTTP Status: ${res.statusCode} ${res.statusMessage}`);
                  console.log('Response headers:', JSON.stringify(res.headers, null, 2));
                  console.log('Response body:', data);

                  if (res.statusCode === 200 || res.statusCode === 204) {
                    console.log(`SUCCESS: ${filename} uploaded!`);
                  } else if (res.statusCode === 409) {
                    console.log(`NOTE: ${filename} already exists (409 Conflict). Try PATCH to update.`);
                  } else {
                    console.error(`FAILED: ${filename} - HTTP ${res.statusCode}`);
                  }
                  resolve();
                });
              });

              req.on('error', (err) => {
                console.error(`Network error for ${filename}:`, err.message);
                reject(err);
              });

              req.write(body);
              req.end();
            });
          }

          (async () => {
            const files = fs.readFileSync('all_files.txt', 'utf8')
              .trim().split('\n').filter(Boolean);

            if (files.length === 0) {
              console.log('No .js files found in SuiteScripts folder!');
              process.exit(0);
            }

            console.log(`\nUploading ${files.length} file(s)...`);

            let successCount = 0;
            let failCount = 0;

            for (const file of files) {
              if (fs.existsSync(file)) {
                try {
                  await uploadFile(file);
                  successCount++;
                } catch (err) {
                  console.error(`Error uploading ${file}:`, err.message);
                  failCount++;
                }
              } else {
                console.warn(`File not found: ${file}`);
              }
            }

            console.log(`\n=== SUMMARY ===`);
            console.log(`Success: ${successCount}`);
            console.log(`Failed:  ${failCount}`);
          })();
          NODEJS
