name: Deploy Changed Scripts to NetSuite

on:
  push:
    branches:
      - main
    paths:
      - 'netsuite-test/src/FileCabinet/SuiteScripts/**'
  workflow_dispatch:  # allows manual trigger from GitHub Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          mkdir -p /tmp/nsdeploy
          cd /tmp/nsdeploy
          npm init -y
          npm install oauth-1.0a

      - name: Deploy changed files to NetSuite
        env:
          NS_ACCOUNT_ID: ${{ secrets.NS_ACCOUNT_ID }}
          NS_CONSUMER_KEY: ${{ secrets.NS_CONSUMER_KEY }}
          NS_CONSUMER_SECRET: ${{ secrets.NS_CONSUMER_SECRET }}
          NS_TOKEN_ID: ${{ secrets.NS_TOKEN_ID }}
          NS_TOKEN_SECRET: ${{ secrets.NS_TOKEN_SECRET }}
          NS_SCRIPTS_FOLDER_ID: ${{ secrets.NS_SCRIPTS_FOLDER_ID }}
          NS_RESTLET_SCRIPT: 3020
          NS_RESTLET_DEPLOY: 1
        run: |
          # Get only changed SuiteScript files
          git diff --name-only HEAD~1 HEAD | grep 'netsuite-test/src/FileCabinet/SuiteScripts/' > changed_files.txt || true

          echo "=== Changed files ==="
          cat changed_files.txt
          echo "===================="

          if [ ! -s changed_files.txt ]; then
            echo "No SuiteScript files changed. Skipping."
            exit 0
          fi

          node << 'NODEJS'
          const fs = require('fs');
          const https = require('https');
          const crypto = require('crypto');
          const OAuth = require('/tmp/nsdeploy/node_modules/oauth-1.0a');

          const accountId = process.env.NS_ACCOUNT_ID;
          const consumerKey = process.env.NS_CONSUMER_KEY;
          const consumerSecret = process.env.NS_CONSUMER_SECRET;
          const tokenId = process.env.NS_TOKEN_ID;
          const tokenSecret = process.env.NS_TOKEN_SECRET;
          const folderId = parseInt(process.env.NS_SCRIPTS_FOLDER_ID);
          const restletScript = process.env.NS_RESTLET_SCRIPT;
          const restletDeploy = process.env.NS_RESTLET_DEPLOY;

          // OAuth setup
          const oauth = new OAuth({
            consumer: { key: consumerKey, secret: consumerSecret },
            signature_method: 'HMAC-SHA256',
            hash_function(base_string, key) {
              return crypto.createHmac('sha256', key).update(base_string).digest('base64');
            },
            realm: accountId
          });

          function generateAuthHeader(method, url) {
            const token = { key: tokenId, secret: tokenSecret };
            const requestData = { url, method };
            const authObj = oauth.authorize(requestData, token);
            return oauth.toHeader(authObj).Authorization;
          }

          async function uploadFile(filepath) {
            const filename = filepath.split('/').pop();
            const fileContents = fs.readFileSync(filepath, 'utf8');

            const url = `https://${accountId}.restlets.api.netsuite.com/app/site/hosting/restlet.nl?script=${restletScript}&deploy=${restletDeploy}`;

            const body = JSON.stringify({
              name: filename,
              contents: fileContents,
              folderId: folderId
            });

            const authHeader = generateAuthHeader('POST', url);

            console.log(`\n--- Uploading: ${filename} ---`);

            return new Promise((resolve, reject) => {
              const urlObj = new URL(url);
              const options = {
                hostname: urlObj.hostname,
                path: urlObj.pathname + urlObj.search,
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': authHeader,
                  'Content-Length': Buffer.byteLength(body)
                }
              };

              const req = https.request(options, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  console.log(`HTTP Status: ${res.statusCode}`);
                  console.log(`Response: ${data}`);

                  try {
                    const parsed = JSON.parse(data);
                    if (parsed.success) {
                      console.log(`✅ SUCCESS: ${filename} uploaded! File ID: ${parsed.fileId}`);
                    } else {
                      console.error(`❌ FAILED: ${filename} - ${parsed.error}`);
                    }
                  } catch(e) {
                    console.log(`Raw response: ${data}`);
                  }
                  resolve();
                });
              });

              req.on('error', (err) => {
                console.error(`Network error: ${err.message}`);
                reject(err);
              });

              req.write(body);
              req.end();
            });
          }

          (async () => {
            const files = fs.readFileSync('changed_files.txt', 'utf8')
              .trim().split('\n').filter(Boolean);

            console.log(`\nDeploying ${files.length} file(s) to NetSuite...`);

            let success = 0;
            let failed = 0;

            for (const file of files) {
              if (fs.existsSync(file)) {
                try {
                  await uploadFile(file);
                  success++;
                } catch (err) {
                  console.error(`Error: ${err.message}`);
                  failed++;
                }
              } else {
                console.warn(`File not found: ${file}`);
              }
            }

            console.log(`\n=== SUMMARY ===`);
            console.log(`✅ Success: ${success}`);
            console.log(`❌ Failed:  ${failed}`);

            if (failed > 0) process.exit(1);
          })();
          NODEJS
