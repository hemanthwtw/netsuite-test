name: Deploy Changed Scripts to NetSuite

on:
  push:
    branches:
      - main
    paths:
      - 'netsuite-test/src/FileCabinet/SuiteScripts/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-22.04  # slightly faster than ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # SPEED IMPROVEMENT 1 — Cache npm packages
      - name: Cache npm dependencies
        id: cache-npm
        uses: actions/cache@v3
        with:
          path: /tmp/nsdeploy
          key: npm-oauth-v1

      - name: Install dependencies (only if cache miss)
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/nsdeploy
          cd /tmp/nsdeploy
          npm init -y
          npm install oauth-1.0a

      - name: Deploy changed files to NetSuite
        env:
          NS_ACCOUNT_ID: ${{ secrets.NS_ACCOUNT_ID }}
          NS_CONSUMER_KEY: ${{ secrets.NS_CONSUMER_KEY }}
          NS_CONSUMER_SECRET: ${{ secrets.NS_CONSUMER_SECRET }}
          NS_TOKEN_ID: ${{ secrets.NS_TOKEN_ID }}
          NS_TOKEN_SECRET: ${{ secrets.NS_TOKEN_SECRET }}
          NS_SCRIPTS_FOLDER_ID: ${{ secrets.NS_SCRIPTS_FOLDER_ID }}
          NS_RESTLET_SCRIPT: 2818
          NS_RESTLET_DEPLOY: 1
        run: |
          # Get only changed SuiteScript files
          git diff --name-only HEAD~1 HEAD | grep 'netsuite-test/src/FileCabinet/SuiteScripts/' > changed_files.txt || true

          echo "=== Changed files ==="
          cat changed_files.txt
          echo "===================="

          if [ ! -s changed_files.txt ]; then
            echo "No SuiteScript files changed. Skipping."
            exit 0
          fi

          node << 'NODEJS'
          const fs = require('fs');
          const https = require('https');
          const crypto = require('crypto');
          const OAuth = require('/tmp/nsdeploy/node_modules/oauth-1.0a');

          const accountId = process.env.NS_ACCOUNT_ID.toUpperCase();
          const accountIdLower = process.env.NS_ACCOUNT_ID.toLowerCase();
          const consumerKey = process.env.NS_CONSUMER_KEY;
          const consumerSecret = process.env.NS_CONSUMER_SECRET;
          const tokenId = process.env.NS_TOKEN_ID;
          const tokenSecret = process.env.NS_TOKEN_SECRET;
          const folderId = parseInt(process.env.NS_SCRIPTS_FOLDER_ID);
          const restletScript = process.env.NS_RESTLET_SCRIPT;
          const restletDeploy = process.env.NS_RESTLET_DEPLOY;

          // OAuth setup
          const oauth = new OAuth({
            consumer: { key: consumerKey, secret: consumerSecret },
            signature_method: 'HMAC-SHA256',
            hash_function(base_string, key) {
              return crypto.createHmac('sha256', key).update(base_string).digest('base64');
            },
            realm: accountId
          });

          function generateAuthHeader(method, url) {
            const token = { key: tokenId, secret: tokenSecret };
            const requestData = { url, method };
            const authObj = oauth.authorize(requestData, token);
            return oauth.toHeader(authObj).Authorization;
          }

          async function uploadFile(filepath) {
            const filename = filepath.split('/').pop();
            const fileContents = fs.readFileSync(filepath, 'utf8');
            const url = `https://${accountIdLower}.restlets.api.netsuite.com/app/site/hosting/restlet.nl?script=${restletScript}&deploy=${restletDeploy}`;

            const body = JSON.stringify({
              name: filename,
              contents: fileContents,
              folderId: folderId
            });

            const authHeader = generateAuthHeader('POST', url);

            return new Promise((resolve) => {
              const urlObj = new URL(url);
              const options = {
                hostname: urlObj.hostname,
                path: urlObj.pathname + urlObj.search,
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': authHeader,
                  'Content-Length': Buffer.byteLength(body)
                }
              };

              const req = https.request(options, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try {
                    const parsed = JSON.parse(data);
                    if (parsed.success) {
                      console.log(`✅ SUCCESS: ${filename} → File ID: ${parsed.fileId}`);
                      resolve({ success: true, file: filename });
                    } else {
                      console.error(`❌ FAILED: ${filename} → ${parsed.error}`);
                      resolve({ success: false, file: filename });
                    }
                  } catch(e) {
                    console.error(`❌ ERROR: ${filename} → ${data}`);
                    resolve({ success: false, file: filename });
                  }
                });
              });

              req.on('error', (err) => {
                console.error(`❌ NETWORK ERROR: ${filename} → ${err.message}`);
                resolve({ success: false, file: filename });
              });

              req.write(body);
              req.end();
            });
          }

          (async () => {
            const files = fs.readFileSync('changed_files.txt', 'utf8')
              .trim().split('\n')
              .filter(Boolean)
              .filter(f => fs.existsSync(f));

            if (files.length === 0) {
              console.log('No valid files to upload.');
              process.exit(0);
            }

            console.log(`\nDeploying ${files.length} file(s) in parallel...\n`);

            // SPEED IMPROVEMENT 2 — Upload all files at the same time
            const results = await Promise.all(files.map(uploadFile));

            const success = results.filter(r => r.success).length;
            const failed = results.filter(r => !r.success).length;

            console.log(`\n=== SUMMARY ===`);
            console.log(`✅ Success: ${success}`);
            console.log(`❌ Failed:  ${failed}`);
            console.log(`⏱️  Total files: ${files.length}`);

            if (failed > 0) process.exit(1);
          })();
          NODEJS
